<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Fuel Complaint System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green:      #25D366;
      --green-dark: #128C7E;
      --teal:       #075E54;
      --white:      #FFFFFF;
      --bg:         #F0F2F5;
      --sidebar-bg: #111B21;
      --card:       #FFFFFF;
      --border:     #E9EDEF;
      --text:       #111B21;
      --muted:      #667781;
      --pending:    #F59E0B;
      --inprogress: #3B82F6;
      --resolved:   #22C55E;
      --rejected:   #EF4444;
      --hover:      #F7F8F9;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      background: var(--sidebar-bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-brand {
      padding: 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .sidebar-brand h1 {
      color: var(--green);
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    .sidebar-brand p {
      color: rgba(255,255,255,0.4);
      font-size: 0.75rem;
      margin-top: 2px;
    }

    .sidebar-nav {
      padding: 16px 12px;
      flex: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      color: rgba(255,255,255,0.6);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 4px;
      transition: all 0.15s;
    }

    .nav-item:hover { background: rgba(255,255,255,0.06); color: white; }
    .nav-item.active { background: var(--green); color: white; }

    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .sidebar-footer a {
      color: rgba(255,255,255,0.4);
      font-size: 0.75rem;
      text-decoration: none;
    }

    .sidebar-footer a:hover { color: var(--green); }

    /* ── Main ── */
    .main {
      flex: 1;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .topbar-title {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .refresh-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
      font-family: inherit;
    }

    .refresh-btn:hover { background: var(--border); }
    .refresh-btn svg { width: 14px; height: 14px; }

    .content {
      padding: 28px;
      flex: 1;
    }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
    }

    .stat-card.total  .stat-value { color: var(--teal); }
    .stat-card.pending .stat-value { color: var(--pending); }
    .stat-card.inprogress .stat-value { color: var(--inprogress); }
    .stat-card.resolved .stat-value { color: var(--resolved); }
    .stat-card.rejected .stat-value { color: var(--rejected); }

    .stat-dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block; margin-right: 6px;
    }

    .dot-total    { background: var(--teal); }
    .dot-pending  { background: var(--pending); }
    .dot-inprogress { background: var(--inprogress); }
    .dot-resolved { background: var(--resolved); }
    .dot-rejected { background: var(--rejected); }

    /* ── Filter Bar ── */
    .filter-bar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      color: var(--muted);
    }

    .search-input {
      width: 100%;
      padding: 8px 12px 8px 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.875rem;
      font-family: inherit;
      outline: none;
      background: var(--bg);
    }

    .search-input:focus { border-color: var(--green-dark); }

    .filter-select {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.875rem;
      font-family: inherit;
      background: var(--bg);
      outline: none;
      cursor: pointer;
    }

    .filter-select:focus { border-color: var(--green-dark); }

    /* ── Table ── */
    .table-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .table-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .table-title {
      font-size: 0.9rem;
      font-weight: 600;
    }

    .table-count {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      text-align: left;
      padding: 12px 16px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }

    tbody tr:hover { background: var(--hover); }
    tbody tr:last-child { border-bottom: none; }

    tbody td {
      padding: 13px 16px;
      font-size: 0.875rem;
    }

    .complaint-id {
      font-family: monospace;
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--teal);
    }

    .cnic-masked { font-family: monospace; font-size: 0.82rem; }

    /* Status badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-pending    { background: #FEF3C7; color: #92400E; }
    .badge-in_progress { background: #DBEAFE; color: #1E40AF; }
    .badge-resolved   { background: #DCFCE7; color: #166534; }
    .badge-rejected   { background: #FEE2E2; color: #991B1B; }

    .td-muted { color: var(--muted); font-size: 0.8rem; }

    .details-preview {
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--muted);
      font-size: 0.82rem;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.3; }
    .empty-state p { font-size: 0.9rem; }

    /* Loading state */
    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }

    .page-btns { display: flex; gap: 6px; }

    .page-btn {
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      transition: all 0.15s;
    }

    .page-btn:hover:not(:disabled) { border-color: var(--green-dark); color: var(--green-dark); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .page-btn.active { background: var(--green-dark); color: white; border-color: var(--green-dark); }

    /* ── Detail Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      display: none;
      align-items: flex-start;
      justify-content: flex-end;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      width: 100%;
      max-width: 480px;
      height: 100vh;
      overflow-y: auto;
      box-shadow: -4px 0 24px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      animation: slideIn 0.25s ease-out;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); }
      to   { transform: translateX(0); }
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: white;
      z-index: 10;
    }

    .modal-title {
      font-size: 1rem;
      font-weight: 700;
    }

    .modal-close {
      width: 32px; height: 32px;
      background: var(--bg);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: var(--muted);
      transition: all 0.15s;
    }

    .modal-close:hover { background: var(--border); color: var(--text); }

    .modal-body { padding: 24px; flex: 1; }

    .detail-section {
      margin-bottom: 24px;
    }

    .detail-section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .detail-item { display: flex; flex-direction: column; gap: 3px; }
    .detail-item.full { grid-column: 1 / -1; }

    .detail-item label {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-item span {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
    }

    .detail-item .mono { font-family: monospace; font-size: 0.85rem; }

    .detail-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }

    .location-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #DBEAFE;
      color: #1E40AF;
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 500;
      text-decoration: none;
    }

    .location-chip:hover { background: #BFDBFE; }

    .complaint-image {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-top: 4px;
    }

    .no-image {
      background: var(--bg);
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .modal-footer {
      padding: 20px 24px;
      border-top: 1px solid var(--border);
      position: sticky;
      bottom: 0;
      background: white;
    }

    .status-update {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .status-label-sm {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
    }

    .status-select {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.875rem;
      outline: none;
      cursor: pointer;
    }

    .status-select:focus { border-color: var(--green-dark); }

    .save-btn {
      background: var(--green-dark);
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .save-btn:hover { background: var(--teal); }
    .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .save-feedback {
      font-size: 0.78rem;
      color: var(--resolved);
      margin-top: 8px;
      text-align: center;
      min-height: 18px;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s;
      z-index: 200;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .sidebar { display: none; }

      .content { padding: 16px; }

      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }

      thead th:nth-child(3),
      thead th:nth-child(5),
      tbody td:nth-child(3),
      tbody td:nth-child(5) { display: none; }

      .modal { max-width: 100%; }

      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <h1>⛽ Fuel Complaint</h1>
    <p>Admin Dashboard</p>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-item active" href="/dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      Complaints
    </a>
    <a class="nav-item" href="/" target="_blank">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
      </svg>
      Bot Preview
    </a>
    <a class="nav-item" href="/privacy" target="_blank">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      Privacy Policy
    </a>
  </nav>
  <div class="sidebar-footer">
    <a href="https://supabase.com/dashboard" target="_blank">Supabase Dashboard ↗</a>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title">Complaints</div>
    <div class="topbar-right">
      <button class="refresh-btn" onclick="loadComplaints()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 4v6h-6M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
        Refresh
      </button>
    </div>
  </div>

  <div class="content">
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card total">
        <span class="stat-label"><span class="stat-dot dot-total"></span>Total</span>
        <span class="stat-value" id="stat-total">—</span>
      </div>
      <div class="stat-card pending">
        <span class="stat-label"><span class="stat-dot dot-pending"></span>Pending</span>
        <span class="stat-value" id="stat-pending">—</span>
      </div>
      <div class="stat-card inprogress">
        <span class="stat-label"><span class="stat-dot dot-inprogress"></span>In Progress</span>
        <span class="stat-value" id="stat-inprogress">—</span>
      </div>
      <div class="stat-card resolved">
        <span class="stat-label"><span class="stat-dot dot-resolved"></span>Resolved</span>
        <span class="stat-value" id="stat-resolved">—</span>
      </div>
      <div class="stat-card rejected">
        <span class="stat-label"><span class="stat-dot dot-rejected"></span>Rejected</span>
        <span class="stat-value" id="stat-rejected">—</span>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="Search by CNIC, complaint ID, details..."
          oninput="applyFilters()"
        >
      </div>
      <select class="filter-select" id="filterStatus" onchange="applyFilters()">
        <option value="">All Statuses</option>
        <option value="pending">Pending</option>
        <option value="in_progress">In Progress</option>
        <option value="resolved">Resolved</option>
        <option value="rejected">Rejected</option>
      </select>
      <select class="filter-select" id="filterRegion" onchange="applyFilters()">
        <option value="">All Regions</option>
        <option value="Islamabad">Islamabad</option>
        <option value="Rawalpindi">Rawalpindi</option>
        <option value="Lahore">Lahore</option>
        <option value="Karachi">Karachi</option>
        <option value="Other">Other</option>
      </select>
      <select class="filter-select" id="filterType" onchange="applyFilters()">
        <option value="">All Types</option>
        <option value="Fuel shortage">Fuel shortage ⛽</option>
        <option value="Overpricing">Overpricing 💰</option>
        <option value="Pump closed">Pump closed 🚫</option>
        <option value="Illegal practices">Illegal practices ⚖️</option>
        <option value="Other">Other 📝</option>
      </select>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-header">
        <span class="table-title">All Complaints</span>
        <span class="table-count" id="tableCount">Loading...</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>CNIC</th>
              <th>Region</th>
              <th>Type</th>
              <th>Details</th>
              <th>Status</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="complaintsBody">
            <tr>
              <td colspan="7">
                <div class="loading-state">
                  <div class="spinner"></div>
                  <p>Loading complaints...</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="pagination">
        <span id="pageInfo">Page 1</span>
        <div class="page-btns">
          <button class="page-btn" id="prevBtn" onclick="changePage(-1)" disabled>← Prev</button>
          <button class="page-btn" id="nextBtn" onclick="changePage(1)">Next →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="detailModal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Complaint Details</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
      <!-- filled by JS -->
    </div>
    <div class="modal-footer">
      <div class="status-update">
        <span class="status-label-sm">Update Status:</span>
        <select class="status-select" id="statusSelect">
          <option value="pending">Pending</option>
          <option value="in_progress">In Progress</option>
          <option value="resolved">Resolved</option>
          <option value="rejected">Rejected</option>
        </select>
        <button class="save-btn" id="saveStatusBtn" onclick="saveStatus()">Save</button>
      </div>
      <div class="save-feedback" id="saveFeedback"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let allComplaints = [];
  let filtered = [];
  let currentPage = 1;
  const PER_PAGE = 20;
  let activeComplaint = null;

  // ── Boot ───────────────────────────────────────────────────────────────────
  loadComplaints();

  // ── Data fetching ──────────────────────────────────────────────────────────
  async function loadComplaints() {
    setTableLoading(true);
    try {
      const res = await fetch('/api/complaints');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      allComplaints = json.complaints || [];
      updateStats(allComplaints);
      applyFilters();
    } catch (err) {
      showTableError(err.message);
    }
  }

  function updateStats(data) {
    const counts = { pending: 0, in_progress: 0, resolved: 0, rejected: 0 };
    data.forEach(c => { if (counts[c.status] !== undefined) counts[c.status]++; });
    document.getElementById('stat-total').textContent     = data.length;
    document.getElementById('stat-pending').textContent   = counts.pending;
    document.getElementById('stat-inprogress').textContent = counts.in_progress;
    document.getElementById('stat-resolved').textContent  = counts.resolved;
    document.getElementById('stat-rejected').textContent  = counts.rejected;
  }

  // ── Filtering ──────────────────────────────────────────────────────────────
  function applyFilters() {
    const q      = document.getElementById('searchInput').value.toLowerCase().trim();
    const status = document.getElementById('filterStatus').value;
    const region = document.getElementById('filterRegion').value;
    const type   = document.getElementById('filterType').value;

    filtered = allComplaints.filter(c => {
      if (status && c.status !== status) return false;
      if (region && c.region !== region) return false;
      if (type   && !c.complaint_type?.includes(type)) return false;
      if (q) {
        const haystack = [
          c.complaint_code, c.cnic, c.details,
          c.region, c.complaint_type, c.phone_number
        ].join(' ').toLowerCase();
        if (!haystack.includes(q)) return false;
      }
      return true;
    });

    currentPage = 1;
    renderTable();
  }

  // ── Table render ───────────────────────────────────────────────────────────
  function renderTable() {
    const tbody = document.getElementById('complaintsBody');
    const total = filtered.length;
    const start = (currentPage - 1) * PER_PAGE;
    const page  = filtered.slice(start, start + PER_PAGE);

    document.getElementById('tableCount').textContent =
      total === allComplaints.length
        ? `${total} complaints`
        : `${total} of ${allComplaints.length} complaints`;

    if (page.length === 0) {
      tbody.innerHTML = `
        <tr><td colspan="7">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <p>No complaints found</p>
          </div>
        </td></tr>`;
    } else {
      tbody.innerHTML = page.map(c => `
        <tr onclick="openModal(${c.id})">
          <td><span class="complaint-id">${c.complaint_code || '—'}</span></td>
          <td><span class="cnic-masked">${maskCnic(c.cnic)}</span></td>
          <td>${c.region || '—'}</td>
          <td>${c.complaint_type || '—'}</td>
          <td><div class="details-preview">${escHtml(c.details || '—')}</div></td>
          <td>${statusBadge(c.status)}</td>
          <td class="td-muted">${formatDate(c.created_at)}</td>
        </tr>
      `).join('');
    }

    // Pagination
    const totalPages = Math.ceil(total / PER_PAGE);
    document.getElementById('pageInfo').textContent =
      `Page ${currentPage} of ${Math.max(totalPages, 1)}`;
    document.getElementById('prevBtn').disabled = currentPage <= 1;
    document.getElementById('nextBtn').disabled = currentPage >= totalPages;
  }

  function changePage(dir) {
    currentPage += dir;
    renderTable();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Modal ──────────────────────────────────────────────────────────────────
  function openModal(id) {
    const complaint = allComplaints.find(c => c.id === id);
    if (!complaint) return;
    activeComplaint = complaint;

    document.getElementById('modalTitle').textContent =
      complaint.complaint_code || `Complaint #${complaint.id}`;

    // Body content
    const locationHtml = complaint.latitude && complaint.longitude
      ? `<a class="location-chip" href="https://maps.google.com/?q=${complaint.latitude},${complaint.longitude}" target="_blank">
           📍 View on Google Maps
         </a>`
      : complaint.location_text
        ? `<span>${escHtml(complaint.location_text)}</span>`
        : `<span style="color:var(--muted)">Not provided</span>`;

    const imageHtml = complaint.image_url
      ? `<img class="complaint-image" src="${complaint.image_url}" alt="Complaint image" onerror="this.style.display='none'">`
      : `<div class="no-image">📷 No image attached</div>`;

    document.getElementById('modalBody').innerHTML = `
      <div class="detail-section">
        <div class="detail-section-title">Complaint Info</div>
        <div class="detail-grid">
          <div class="detail-item">
            <label>Complaint ID</label>
            <span class="mono">${complaint.complaint_code || '—'}</span>
          </div>
          <div class="detail-item">
            <label>Status</label>
            <span>${statusBadge(complaint.status)}</span>
          </div>
          <div class="detail-item">
            <label>Type</label>
            <span>${complaint.complaint_type || '—'}</span>
          </div>
          <div class="detail-item">
            <label>Region</label>
            <span>${complaint.region || '—'}</span>
          </div>
          <div class="detail-item">
            <label>Submitted</label>
            <span>${formatDateFull(complaint.created_at)}</span>
          </div>
        </div>
      </div>

      <hr class="detail-divider">

      <div class="detail-section">
        <div class="detail-section-title">Citizen Info</div>
        <div class="detail-grid">
          <div class="detail-item">
            <label>CNIC</label>
            <span class="mono">${maskCnic(complaint.cnic)}</span>
          </div>
          <div class="detail-item">
            <label>Phone</label>
            <span class="mono">${complaint.phone_number || '—'}</span>
          </div>
        </div>
      </div>

      <hr class="detail-divider">

      <div class="detail-section">
        <div class="detail-section-title">Complaint Details</div>
        <div class="detail-grid">
          <div class="detail-item full">
            <label>Description</label>
            <span style="white-space:pre-wrap;line-height:1.5">${escHtml(complaint.details || '—')}</span>
          </div>
          <div class="detail-item full">
            <label>Location</label>
            ${locationHtml}
          </div>
        </div>
      </div>

      <hr class="detail-divider">

      <div class="detail-section">
        <div class="detail-section-title">Evidence</div>
        ${imageHtml}
      </div>
    `;

    // Set status selector to current value
    const sel = document.getElementById('statusSelect');
    sel.value = complaint.status || 'pending';
    document.getElementById('saveFeedback').textContent = '';
    document.getElementById('saveStatusBtn').disabled = false;

    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
    activeComplaint = null;
  }

  function closeModalOnOverlay(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  // ── Status update ──────────────────────────────────────────────────────────
  async function saveStatus() {
    if (!activeComplaint) return;
    const newStatus = document.getElementById('statusSelect').value;
    const btn = document.getElementById('saveStatusBtn');
    const feedback = document.getElementById('saveFeedback');

    btn.disabled = true;
    btn.textContent = 'Saving...';
    feedback.textContent = '';

    try {
      const res = await fetch(`/api/complaints/${activeComplaint.id}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Failed to update');
      }

      // Update local state
      const idx = allComplaints.findIndex(c => c.id === activeComplaint.id);
      if (idx !== -1) {
        allComplaints[idx].status = newStatus;
        activeComplaint.status = newStatus;
      }

      updateStats(allComplaints);
      applyFilters();

      feedback.textContent = '✅ Status updated successfully';
      feedback.style.color = 'var(--resolved)';
      showToast(`Status updated to "${newStatus}"`);
    } catch (err) {
      feedback.textContent = `❌ ${err.message}`;
      feedback.style.color = 'var(--rejected)';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save';
    }
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function maskCnic(cnic) {
    if (!cnic || cnic.length < 8) return cnic || '—';
    return cnic.slice(0, 5) + '*****' + cnic.slice(-3);
  }

  function statusBadge(status) {
    const map = {
      pending:     ['badge-pending',    '🟡 Pending'],
      in_progress: ['badge-in_progress','🔵 In Progress'],
      resolved:    ['badge-resolved',   '🟢 Resolved'],
      rejected:    ['badge-rejected',   '🔴 Rejected']
    };
    const [cls, label] = map[status] || ['badge-pending', status || '—'];
    return `<span class="badge ${cls}">${label}</span>`;
  }

  function formatDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-PK', {
      day: '2-digit', month: 'short', year: 'numeric'
    });
  }

  function formatDateFull(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString('en-PK', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setTableLoading(on) {
    if (on) {
      document.getElementById('complaintsBody').innerHTML = `
        <tr><td colspan="7">
          <div class="loading-state">
            <div class="spinner"></div>
            <p>Loading complaints...</p>
          </div>
        </td></tr>`;
      document.getElementById('tableCount').textContent = 'Loading...';
    }
  }

  function showTableError(msg) {
    document.getElementById('complaintsBody').innerHTML = `
      <tr><td colspan="7">
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <p>Error: ${escHtml(msg)}</p>
          <p style="margin-top:8px;font-size:0.75rem">Make sure the server is running and Supabase is configured.</p>
        </div>
      </td></tr>`;
    document.getElementById('tableCount').textContent = 'Error';
    ['stat-total','stat-pending','stat-inprogress','stat-resolved','stat-rejected']
      .forEach(id => document.getElementById(id).textContent = '—');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // Close modal on Escape key
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });
</script>
</body>
</html>
