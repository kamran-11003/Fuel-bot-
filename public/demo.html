<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bot Preview — Fuel Complaint System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green: #25D366;
      --green-dark: #128C7E;
      --teal: #075E54;
      --green-light: #DCF8C6;
      --chat-bg: #E5DDD5;
      --white: #FFFFFF;
      --grey-100: #F7F8F9;
      --grey-200: #E9EDEF;
      --grey-300: #8696A0;
      --grey-400: #667781;
      --text: #111B21;
      --text-2: #667781;
      --bot-bubble: #FFFFFF;
      --user-bubble: #D9FDD3;
      --shadow: rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--grey-200);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .back-bar {
      width: 100%;
      max-width: 420px;
      margin-bottom: 10px;
    }

    .back-link {
      color: var(--teal);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .back-link:hover { text-decoration: underline; }

    .phone-frame {
      width: 100%;
      max-width: 420px;
      height: 88vh;
      max-height: 820px;
      background: var(--white);
      border-radius: 36px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .phone-frame::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 130px; height: 26px;
      background: #1a1a1a;
      border-radius: 0 0 18px 18px;
      z-index: 100;
    }

    .header {
      background: var(--teal);
      padding: 44px 14px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-avatar {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 18px;
    }

    .header-info { flex: 1; }
    .header-title { color: white; font-size: 16px; font-weight: 600; }
    .header-status { color: rgba(255,255,255,0.75); font-size: 12px; }

    .header-icons { display: flex; gap: 18px; color: white; }
    .header-icons svg { width: 20px; height: 20px; }

    .chat-container {
      flex: 1;
      background: var(--chat-bg);
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23c9c9c9' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .chat-container::-webkit-scrollbar { width: 4px; }
    .chat-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }

    .date-divider {
      text-align: center; margin: 8px 0;
    }
    .date-divider span {
      background: rgba(255,255,255,0.9);
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 11px;
      color: var(--text-2);
      font-weight: 500;
    }

    .message {
      max-width: 82%;
      padding: 7px 10px;
      border-radius: 8px;
      animation: msgIn 0.25s ease-out;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.bot {
      background: var(--bot-bubble);
      align-self: flex-start;
      border-top-left-radius: 0;
      box-shadow: 0 1px 2px var(--shadow);
    }

    .message.user {
      background: var(--user-bubble);
      align-self: flex-end;
      border-top-right-radius: 0;
      box-shadow: 0 1px 2px var(--shadow);
    }

    .message-text {
      font-size: 14px;
      line-height: 1.45;
      color: var(--text);
      white-space: pre-wrap;
    }

    .message-text b { font-weight: 600; }

    .message-time {
      font-size: 10.5px;
      color: var(--grey-400);
      text-align: right;
      margin-top: 3px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 3px;
    }

    .checks { color: #53bdeb; }

    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .qr-btn {
      background: transparent;
      border: 1.5px solid var(--green-dark);
      color: var(--green-dark);
      padding: 7px 14px;
      border-radius: 18px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .qr-btn:hover { background: var(--green-dark); color: white; }
    .qr-btn:active { transform: scale(0.95); }

    .list-opts { margin-top: 8px; border-top: 1px solid var(--grey-200); padding-top: 8px; }

    .list-opt {
      display: flex; align-items: center;
      gap: 10px; padding: 10px;
      border-radius: 6px; cursor: pointer;
      transition: background 0.15s;
    }

    .list-opt:hover { background: var(--grey-100); }

    .list-opt-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 16px;
    }

    .list-opt-text { flex: 1; font-size: 13.5px; color: var(--text); font-weight: 500; }
    .list-opt-arrow { color: var(--grey-300); font-size: 16px; }

    .summary-card {
      background: #f8f9fa;
      border: 1px solid var(--grey-200);
      border-radius: 10px;
      padding: 12px;
      margin-top: 8px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      font-size: 12.5px;
      border-bottom: 1px dashed var(--grey-200);
    }

    .summary-row:last-child { border-bottom: none; }
    .s-label { color: var(--text-2); font-weight: 500; }
    .s-value { color: var(--text); font-weight: 600; text-align: right; max-width: 55%; }
    .s-value.ok { color: var(--green-dark); }

    .loc-preview {
      background: var(--grey-100);
      border-radius: 8px;
      padding: 10px;
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .loc-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #EA4335, #C5221F);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 20px;
    }

    .loc-title { font-size: 13px; font-weight: 600; }
    .loc-coords { font-size: 11px; color: var(--text-2); }

    .success-card {
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: white;
      padding: 16px;
      border-radius: 12px;
      text-align: center;
      margin-top: 8px;
    }

    .success-icon {
      font-size: 36px; margin-bottom: 8px;
    }

    .success-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .success-id {
      font-family: monospace;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 2px;
      background: rgba(255,255,255,0.2);
      padding: 8px 16px;
      border-radius: 8px;
      margin: 10px 0;
    }

    .status-pill {
      display: inline-block;
      background: rgba(255,255,255,0.25);
      padding: 3px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .typing-ind {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 10px;
      background: var(--bot-bubble);
      border-radius: 8px;
      border-top-left-radius: 0;
      width: fit-content;
      box-shadow: 0 1px 2px var(--shadow);
    }

    .t-dot {
      width: 7px; height: 7px;
      background: var(--grey-300);
      border-radius: 50%;
      animation: tb 1.4s infinite ease-in-out both;
    }

    .t-dot:nth-child(1) { animation-delay: -0.32s; }
    .t-dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes tb {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    .input-area {
      background: var(--grey-100);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-icons { display: flex; gap: 14px; color: var(--grey-400); }
    .input-icons svg { width: 22px; height: 22px; }

    .input-field {
      flex: 1;
      background: white;
      border: none;
      border-radius: 22px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    .input-field::placeholder { color: var(--grey-300); }

    .send-btn {
      width: 44px; height: 44px;
      background: var(--green-dark);
      border: none; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .send-btn:hover { transform: scale(1.06); }
    .send-btn:active { transform: scale(0.94); }
    .send-btn svg { width: 20px; height: 20px; color: white; margin-left: 2px; }

    .demo-bar {
      width: 100%;
      max-width: 420px;
      margin-top: 10px;
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .demo-btn {
      background: var(--teal);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .demo-btn:hover { background: var(--green-dark); }

    @media (max-width: 480px) {
      body { padding: 0; }
      .back-bar, .demo-bar { padding: 8px 12px; }
      .phone-frame { border-radius: 0; height: 100vh; max-height: none; }
      .phone-frame::before { display: none; }
      .header { padding-top: 14px; }
    }
  </style>
</head>
<body>

  <div class="back-bar">
    <a href="/" class="back-link">← Back to Home</a>
  </div>

  <div class="phone-frame">
    <div class="header">
      <div class="header-avatar">⛽</div>
      <div class="header-info">
        <div class="header-title">Fuel Complaint System</div>
        <div class="header-status">Government of Pakistan</div>
      </div>
      <div class="header-icons">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>
        </svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>
        </svg>
      </div>
    </div>

    <div class="chat-container" id="chat">
      <div class="date-divider"><span>Today</span></div>
    </div>

    <div class="input-area">
      <div class="input-icons">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>
        </svg>
      </div>
      <input type="text" class="input-field" id="inp" placeholder="Type a message">
      <div class="input-icons">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </div>
      <button class="send-btn" id="sendBtn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <div class="demo-bar">
    <button class="demo-btn" onclick="runDemo()">▶️ Auto Demo</button>
    <button class="demo-btn" onclick="resetChat()">🔄 Reset</button>
  </div>

<script>
  const chat = document.getElementById('chat');
  const inp  = document.getElementById('inp');
  const send = document.getElementById('sendBtn');

  let step = 0;
  let running = false;

  function t() {
    return new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  }

  function botMsg(html, extras = '') {
    const d = document.createElement('div');
    d.className = 'message bot';
    d.innerHTML = `<div class="message-text">${html}</div>${extras}<div class="message-time">${t()}</div>`;
    chat.appendChild(d);
    scrollDown();
  }

  function userMsg(text) {
    const d = document.createElement('div');
    d.className = 'message user';
    d.innerHTML = `<div class="message-text">${text}</div><div class="message-time">${t()} <span class="checks">✓✓</span></div>`;
    chat.appendChild(d);
    scrollDown();
  }

  function showTyping() {
    const d = document.createElement('div');
    d.className = 'typing-ind';
    d.id = 'typ';
    d.innerHTML = '<div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div>';
    chat.appendChild(d);
    scrollDown();
  }

  function hideTyping() {
    const e = document.getElementById('typ');
    if (e) e.remove();
  }

  function scrollDown() {
    chat.scrollTop = chat.scrollHeight;
  }

  function qr(buttons) {
    return `<div class="quick-replies">${buttons.map(b =>
      `<button class="qr-btn" onclick="pick('${b.id}','${b.label}')">${b.label}</button>`
    ).join('')}</div>`;
  }

  function list(opts) {
    return `<div class="list-opts">${opts.map(o =>
      `<div class="list-opt" onclick="pick('${o.id}','${o.label}')">
        <div class="list-opt-icon">${o.icon}</div>
        <div class="list-opt-text">${o.label}</div>
        <div class="list-opt-arrow">›</div>
       </div>`
    ).join('')}</div>`;
  }

  function summary() {
    return `<div class="summary-card">
      <div class="summary-row"><span class="s-label">🪪 CNIC</span><span class="s-value">35202*****678</span></div>
      <div class="summary-row"><span class="s-label">📍 Region</span><span class="s-value">Islamabad</span></div>
      <div class="summary-row"><span class="s-label">📝 Type</span><span class="s-value">Fuel shortage ⛽</span></div>
      <div class="summary-row"><span class="s-label">📄 Details</span><span class="s-value">2 din se petrol nahi...</span></div>
      <div class="summary-row"><span class="s-label">🗺️ Location</span><span class="s-value ok">Attached ✓</span></div>
      <div class="summary-row"><span class="s-label">📷 Image</span><span class="s-value">Not attached</span></div>
    </div>`;
  }

  function success() {
    return `<div class="success-card">
      <div class="success-icon">🎉</div>
      <div class="success-title">Shukriya!</div>
      <div style="font-size:13px;opacity:.9;margin-bottom:4px">Complaint successfully register ho gayi</div>
      <div class="success-id">FC-00001</div>
      <div class="status-pill">📊 Status: Pending</div>
    </div>`;
  }

  function pick(id, label) {
    userMsg(label);
    advance(id);
  }

  async function advance(input) {
    step++;
    await delay(450);
    showTyping();
    await delay(900);
    hideTyping();

    switch(step) {
      case 1:
        botMsg('Baraye meherbani apna <b>CNIC number</b> enter karein.\n\n📝 Format: 13 digits without dashes\n📌 Example: 3520212345678');
        break;
      case 2:
        botMsg('Apna <b>region</b> select karein: 📍',
          list([
            {id:'isl', icon:'🏛️', label:'Islamabad'},
            {id:'rwp', icon:'🌆', label:'Rawalpindi'},
            {id:'lhr', icon:'🏰', label:'Lahore'},
            {id:'khi', icon:'🌊', label:'Karachi'},
            {id:'oth', icon:'📍', label:'Other'},
          ]));
        break;
      case 3:
        botMsg('Complaint ki <b>type</b> select karein:',
          list([
            {id:'s',  icon:'⛽', label:'Fuel shortage ⛽'},
            {id:'op', icon:'💰', label:'Overpricing 💰'},
            {id:'pc', icon:'🚫', label:'Pump closed 🚫'},
            {id:'ip', icon:'⚖️', label:'Illegal practices ⚖️'},
            {id:'o',  icon:'📝', label:'Other 📝'},
          ]));
        break;
      case 4:
        botMsg('Apni complaint ki <b>tafseel</b> likhein.\n\n📝 Jitni zyada detail dein ge, utna behtar hoga.');
        break;
      case 5:
        botMsg('Pump ki <b>location</b> share karein. 📍\n\n👇 WhatsApp mein attachment icon (📎) press karein aur "Location" select karein.\n\nYa pump ka pura address type kar dein.');
        break;
      case 6:
        botMsg('✅ Location receive ho gayi!');
        await delay(600);
        showTyping(); await delay(800); hideTyping();
        botMsg('Agar mumkin ho to <b>tasveer</b> upload karein. 📷\n\nYe step optional hai.',
          qr([{id:'skip', label:'Skip ⏭️'}]));
        break;
      case 7:
        botMsg('Baraye meherbani apni complaint ki details check karein:', summary() +
          qr([{id:'submit', label:'Submit ✅'}, {id:'edit', label:'Edit ✏️'}]));
        break;
      case 8:
        botMsg('', success());
        await delay(700);
        showTyping(); await delay(800); hideTyping();
        botMsg('Hum jald az jald aap ki complaint par action lein ge.\n\nAgar koi aur complaint ho toh "Start" type karein.',
          qr([{id:'restart', label:'Start 🚀'}]));
        break;
      default:
        resetChat();
    }
  }

  function delay(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  async function runDemo() {
    if (running) return;
    running = true;
    resetChat();

    botMsg('Assalam-o-Alaikum! 🇵🇰\n\nWelcome to the <b>Fuel Complaint System</b>.\n\nAap yahan apni fuel-related complaint register kar sakte hain.\n\nKya aap shuru karna chahte hain?',
      qr([{id:'yes', label:'Yes ✅'}, {id:'no', label:'No ❌'}]));

    const steps = [
      ['Yes ✅', 'yes'],
      ['3520212345678', 'cnic'],
      ['Islamabad', 'isl'],
      ['Fuel shortage ⛽', 's'],
      ['2 din se petrol nahi hai pump par. Queue mein 50+ gaariyan hain.', 'det'],
      ['Shell F-8 Markaz, Islamabad', 'loc'],
      ['Skip ⏭️', 'skip'],
      ['Submit ✅', 'submit'],
    ];

    for (const [label, id] of steps) {
      await delay(1400);
      userMsg(label);
      await advance(id);
    }

    running = false;
  }

  function resetChat() {
    step = 0;
    running = false;
    chat.innerHTML = '<div class="date-divider"><span>Today</span></div>';
    botMsg('Assalam-o-Alaikum! 🇵🇰\n\nWelcome to the <b>Fuel Complaint System</b>.\n\nAap yahan apni fuel-related complaint register kar sakte hain.\n\nKya aap shuru karna chahte hain?',
      qr([{id:'yes', label:'Yes ✅'}, {id:'no', label:'No ❌'}]));
  }

  send.addEventListener('click', () => {
    const v = inp.value.trim();
    if (!v) return;
    userMsg(v);
    inp.value = '';
    advance(v);
  });

  inp.addEventListener('keypress', e => { if (e.key === 'Enter') send.click(); });

  // init
  resetChat();
</script>
</body>
</html>
